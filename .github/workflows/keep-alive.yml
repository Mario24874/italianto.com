##############################################################
# ITALIANTO — Supabase Keep-Alive (GitHub Actions)
#
# Alternativa a cron-job.org. Hace ping a la plataforma
# cada 3 días para evitar que Supabase pause el proyecto.
#
# CONFIGURACIÓN:
# 1. En GitHub → Settings → Secrets and variables → Actions
#    Agregar los siguientes secrets:
#      KEEP_ALIVE_SECRET  = el valor de KEEP_ALIVE_SECRET de tu .env
#      APP_URL            = https://italianto.com
#
# 2. Habilitar Actions en tu repositorio si está desactivado.
##############################################################
name: Supabase Keep-Alive

on:
  schedule:
    # Ejecutar cada 3 días a las 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch:  # Permite ejecución manual desde la UI de GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping keep-alive endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.KEEP_ALIVE_SECRET }}" \
            "${{ secrets.APP_URL }}/api/keep-alive")

          echo "Response code: $response"

          if [ "$response" != "200" ]; then
            echo "❌ Keep-alive ping falló con código $response"
            exit 1
          fi

          echo "✅ Supabase sigue activo"

