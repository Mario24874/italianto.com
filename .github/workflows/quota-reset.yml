name: Monthly Quota Reset

on:
  schedule:
    # Primer día de cada mes a las 00:05 UTC
    - cron: '5 0 1 * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Reset monthly quotas
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/quota-reset")

          echo "Response code: $response"

          if [ "$response" != "200" ]; then
            echo "❌ Quota reset falló con código $response"
            exit 1
          fi

          echo "✅ Quotas mensuales reseteadas correctamente"
