services:
  italianto-platform:
    build:
      context: .
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Clerk
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      # Supabase
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_FREE=${STRIPE_PRICE_FREE}
      - STRIPE_PRICE_ESSENZIALE_MONTHLY=${STRIPE_PRICE_ESSENZIALE_MONTHLY}
      - STRIPE_PRICE_ESSENZIALE_ANNUAL=${STRIPE_PRICE_ESSENZIALE_ANNUAL}
      - STRIPE_PRICE_AVANZATO_MONTHLY=${STRIPE_PRICE_AVANZATO_MONTHLY}
      - STRIPE_PRICE_AVANZATO_ANNUAL=${STRIPE_PRICE_AVANZATO_ANNUAL}
      - STRIPE_PRICE_MAESTRO_MONTHLY=${STRIPE_PRICE_MAESTRO_MONTHLY}
      - STRIPE_PRICE_MAESTRO_ANNUAL=${STRIPE_PRICE_MAESTRO_ANNUAL}
      # App
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - CRON_SECRET=${CRON_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
